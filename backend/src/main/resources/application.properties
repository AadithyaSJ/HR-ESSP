spring.application.name=dot

# Database Configuration
spring.datasource.url=jdbc:postgresql://172.26.25.122:5432/dot_solution?options=-c%20TimeZone=Asia/Kolkata
spring.datasource.username=springuser
spring.datasource.password=spring123

# Hibernate/JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Kolkata
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Server Configuration
server.port=8080

# Disable Spring AI S3 vector store auto-configuration
spring.autoconfigure.exclude=org.springframework.ai.vectorstore.s3.autoconfigure.S3VectorStoreAutoConfiguration

# Logging
logging.level.root=INFO
logging.level.org.springframework.web=DEBUG
logging.level.org.hibernate.SQL=DEBUG

# AWS S3 Storage Settings
aws.s3.bucket=${AWS_S3_BUCKET:hr-man}
aws.s3.region=${AWS_REGION:eu-north-1}
aws.accessKeyId=${AWS_ACCESS_KEY_ID:}
aws.secretKey=${AWS_SECRET_ACCESS_KEY:}
