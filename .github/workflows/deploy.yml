name: Build & Deploy to AWS ECS

on:
  push:
    branches:
      - main
      - develop
  workflow_dispatch:

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  ECS_CLUSTER: hrportal-production-cluster
  BACKEND_SERVICE: hrportal-production-backend-service
  FRONTEND_SERVICE: hrportal-production-frontend-service
  BACKEND_ECR_REPO: hrportal-backend
  FRONTEND_ECR_REPO: hrportal-frontend

jobs:
  build-and-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repository
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Build Backend (Spring Boot JAR)
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build Backend with Maven
        run: |
          cd backend
          mvn clean package -DskipTests

      # 3. Build Frontend (Vue App distribution)
      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Frontend Dependencies & Build
        run: |
          cd frontend
          npm ci
          npm run build

      # 4. Authenticate to AWS
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # 5. Build, tag, and push Backend Image to ECR
      - name: Build, tag, and push Backend Image to ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$BACKEND_ECR_REPO:latest -t $ECR_REGISTRY/$BACKEND_ECR_REPO:$IMAGE_TAG ./backend
          docker push $ECR_REGISTRY/$BACKEND_ECR_REPO:latest
          docker push $ECR_REGISTRY/$BACKEND_ECR_REPO:$IMAGE_TAG

      # 6. Build, tag, and push Frontend Image to ECR
      - name: Build, tag, and push Frontend Image to ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$FRONTEND_ECR_REPO:latest -t $ECR_REGISTRY/$FRONTEND_ECR_REPO:$IMAGE_TAG ./frontend
          docker push $ECR_REGISTRY/$FRONTEND_ECR_REPO:latest
          docker push $ECR_REGISTRY/$FRONTEND_ECR_REPO:$IMAGE_TAG

      # 7. Force new deployment on ECS Fargate Services (to pull the latest pushed images)
      - name: Force new deployment on ECS Fargate
        run: |
          aws ecs update-service --cluster $ECS_CLUSTER --service $BACKEND_SERVICE --force-new-deployment
          aws ecs update-service --cluster $ECS_CLUSTER --service $FRONTEND_SERVICE --force-new-deployment
